<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Sayfası</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #d6a4ab 35%, #ffffff 35%);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .card {
            background: #ffffff;
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 90%; max-width: 600px;
        }

        .video-wrapper {
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
            display: flex;
        }

        /* Videoyu doğrudan tüm alanı kaplayacak şekilde ayarlıyoruz */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        .text-content {
            margin-top: 16px;
            color: #7a7a7a;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="video-wrapper">
            <video id="myVideo" controls playsinline preload="auto">
                <source src="./video.mp4" type="video/mp4">
                Tarayıcınız video etiketini desteklemiyor.
            </video>
        </div>
        
        <div class="text-content">
            ARTIFICIAL NATURE, PURE MATH
        </div>
    </div>

</body>
</html>
