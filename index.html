<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Sayfası</title>
    <style>
        /* Sayfa ve Arka Plan Ayarları */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Görseldeki gibi üst kısım pembe, alt kısım beyaz */
            background: linear-gradient(to bottom, #d6a4ab 35%, #ffffff 35%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Beyaz Kart Tasarımı */
        .card {
            background: #ffffff;
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 600px;
        }

        /* Video Kapsayıcısı */
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #0b0b0b; /* Görseldeki siyah ekran */
            aspect-ratio: 16 / 9;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
        }

        /* Oynatma Düğmesi (Dış Yuvarlak) */
        .play-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            transition: background 0.3s ease, transform 0.2s ease;
            z-index: 2;
        }

        .play-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.05);
        }

        /* Oynatma Düğmesi (İç Üçgen) */
        .play-icon {
            width: 0;
            height: 0;
            border-top: 16px solid transparent;
            border-bottom: 16px solid transparent;
            border-left: 24px solid white;
            margin-left: 6px; /* Üçgeni ortalamak için hafif sağa kaydırma */
        }

        /* Gerçek Video Elementi (Başlangıçta Gizli) */
        .video-wrapper video {
            width: 100%;
            height: 100%;
            display: none; 
            object-fit: cover;
        }

        /* Alt Metin */
        .text-content {
            margin-top: 16px;
            color: #7a7a7a;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="video-wrapper" id="videoContainer">
            <div class="play-btn" id="playButton">
                <div class="play-icon"></div>
            </div>
            
            <video id="myVideo" controls>
                <source src="video.mp4" type="video/mp4">
                Tarayıcınız video etiketini desteklemiyor.
            </video>
        </div>
        
        <div class="text-content">
            ARTIFICIAL NATURE, PURE MATH
        </div>
    </div>

    <script>
        // Tıklama işlevselliğini ekliyoruz
        const container = document.getElementById('videoContainer');
        const playBtn = document.getElementById('playButton');
        const video = document.getElementById('myVideo');

        container.addEventListener('click', function() {
            // Oynatma tuşunu gizle
            playBtn.style.display = 'none';
            // Videoyu görünür yap ve oynat
            video.style.display = 'block';
            video.play();
            // Tıklanabilir özelliği kaldır ki video kontrolleri (durdur/sarı vs.) rahat kullanılsın
            container.style.cursor = 'default';
        });
    </script>

</body>
</html>
