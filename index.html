<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Sayfası</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #d6a4ab 35%, #ffffff 35%);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .card {
            background: #ffffff;
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 90%; max-width: 600px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        /* Video artık hep burada ama başlangıçta tıklamaları almıyor */
        video {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Üstteki Siyah Kapak Katmanı */
        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0b0b0b;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
            cursor: pointer;
        }

        .play-btn {
            width: 70px; height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            transition: 0.3s;
        }

        .play-icon {
            width: 0; height: 0;
            border-top: 16px solid transparent;
            border-bottom: 16px solid transparent;
            border-left: 24px solid white;
            margin-left: 6px;
        }

        .text-content {
            margin-top: 16px;
            color: #7a7a7a;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="video-wrapper">
            <div id="overlay">
                <div class="play-btn"><div class="play-icon"></div></div>
            </div>
            
            <video id="myVideo" controls playsinline>
                <source src="./video.mp4" type="video/mp4">
            </video>
        </div>
        
        <div class="text-content">
            ARTIFICIAL NATURE, PURE MATH
        </div>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('myVideo');

        overlay.addEventListener('click', function() {
            // Kapağı tamamen kaldır
            overlay.style.display = 'none';
            // Videoyu oynat
            video.play();
        });
    </script>

</body>
</html>
